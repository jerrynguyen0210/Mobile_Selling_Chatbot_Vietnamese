services:
  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: chatbot_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./back-end:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: chatbot_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./front-end:/app
    command: streamlit run chatting_bot.py --server.port 8501 --server.address 0.0.0.0

networks:
  default:
    name: chatbot_network
