# =============================================================================
# Alembic — database migration configuration
# =============================================================================
# Usage:
#   alembic upgrade head      # apply all pending migrations
#   alembic downgrade -1      # roll back the last migration
#   alembic revision --autogenerate -m "message"  # generate new migration
#
# Or via Makefile:
#   make migrate
#   make migrate-create MSG="add products table"
#   make migrate-down
# =============================================================================

[alembic]
# Path to the migration scripts directory
script_location = back-end/migrations

# Template for auto-generated revision file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate the slug portion of auto-generated file names
truncate_slug_length = 40

# Timezone for %%(year)d etc. in file_template — use UTC for determinism
timezone = UTC

# Prepend sys.path with these paths when running env.py
prepend_sys_path = .

# Version path separator — use os (default) on Windows, : on Unix-like
version_path_separator = os

# Database URL — can be overridden at runtime via --x option or env var.
# Alembic env.py reads DATABASE_URL from the environment at runtime so this
# line serves as a fallback placeholder only.
sqlalchemy.url = postgresql://chatbot:chatbot_secret@localhost:5432/chatbot

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
